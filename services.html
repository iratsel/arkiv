<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Layanan ARKIV</title>
<script src="/portfolio-gallery/js/data.js"></script>
<style id="shared-style"></style>
<style>
/* HERO */
.page-hero {
  min-height: 70vh; display: flex; align-items: flex-end;
  padding: 80px 64px; background: var(--ink); position: relative; overflow: hidden;
}
.hero-line {
  position: absolute; left: 64px; top: 0; width: 1px; height: 0;
  background: var(--accent); animation: lineGrow 1.2s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes lineGrow { to { height: 60%; } }
.hero-content { position: relative; z-index: 2; }
.hero-eyebrow { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--accent); margin-bottom:20px; margin-left: 24px; }
.hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(64px,10vw,130px); letter-spacing:0.03em; line-height:0.9; color:var(--white); }
.hero-sub { font-size:16px; line-height:1.7; color:rgba(255,255,255,0.45); max-width:500px; font-weight:300; margin-top:28px; margin-left: 24px; }

/* SERVICES GRID */
.services-section { padding: 96px 64px; }
.services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 56px; }
.service-card {
  padding: 40px 36px; border: 1px solid var(--bone); position: relative; overflow: hidden;
  transition: background 0.4s, border-color 0.4s; cursor: default;
}
.service-card::before {
  content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
  background: var(--accent); transform: scaleX(0); transform-origin: left;
  transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
}
.service-card:hover::before { transform: scaleX(1); }
.service-card:hover { background: #fafaf8; border-color: transparent; }
.service-icon {
  width: 40px; height: 40px; margin-bottom: 24px;
  color: var(--accent);
}
.service-icon svg { width: 32px; height: 32px; }
.service-title { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:0.06em; color:var(--ink); margin-bottom:12px; }
.service-desc { font-size:14px; line-height:1.75; color:rgba(26,26,26,0.6); margin-bottom:24px; font-weight:300; }
.service-price { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--accent); }

/* PROCESS */
.process-section { padding: 80px 64px 100px; background: var(--black); }
.process-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
.process-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,5vw,68px); letter-spacing:0.04em; color:var(--white); margin-bottom:64px; }
.process-steps { display:grid; grid-template-columns:repeat(4,1fr); gap:48px; }
.process-step {}
.step-number { font-family:'Bebas Neue',sans-serif; font-size:64px; letter-spacing:0.02em; color:rgba(255,255,255,0.08); line-height:1; margin-bottom:16px; }
.step-line { width:32px; height:2px; background:var(--accent); margin-bottom:16px; }
.step-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.08em; color:var(--white); margin-bottom:10px; }
.step-desc { font-size:13px; line-height:1.75; color:rgba(255,255,255,0.42); font-weight:300; }

/* CTA */
.cta-section {
  padding: 96px 64px; text-align: center; border-top: 1px solid var(--bone);
}
.cta-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,6vw,80px); letter-spacing:0.03em; color:var(--ink); margin-bottom:20px; }
.cta-sub { font-size:16px; color:rgba(26,26,26,0.55); margin-bottom:40px; }
.cta-btn {
  display:inline-block; padding:16px 48px; background:var(--accent); color:var(--white);
  font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
  text-decoration:none; transition:background 0.2s, transform 0.2s;
}
.cta-btn:hover { background:var(--ink); transform:translateY(-2px); }

.section-label { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
.section-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,4.5vw,58px); letter-spacing:0.04em; color:var(--ink); }

/* icons map */
.icon-camera { stroke: currentColor; }
</style>
</head>
<body>
<div id="sidebar-mount"></div>
<div id="page-content">
  <section class="page-hero">
    <div class="hero-line"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">Apa yang Kami Lakukan</div>
      <h1 class="hero-title" id="svc-hero-title">Layanan Kami</h1>
      <p class="hero-sub" id="svc-hero-sub"></p>
    </div>
  </section>

  <section class="services-section">
    <div class="section-label">Keahlian Kami</div>
    <div class="section-title">Semua yang Anda Butuhkan</div>
    <div class="services-grid" id="services-grid"></div>
  </section>

  <section class="process-section">
    <div class="process-label">Cara Kerja Kami</div>
    <div class="process-title">Proses yang Sederhana,<br>Hasil yang Luar Biasa</div>
    <div class="process-steps" id="process-steps"></div>
  </section>

  <section class="cta-section">
    <div class="cta-title">Siap Mulai Proyek?</div>
    <p class="cta-sub">Konsultasikan kebutuhan Anda bersama kami — gratis dan tanpa komitmen.</p>
    <a href="/portfolio-gallery/contact.html" class="cta-btn">Hubungi Kami</a>
  </section>
</div>

<script>
document.getElementById('shared-style').textContent = ARKIV.getSharedCSS();
document.getElementById('sidebar-mount').innerHTML = ARKIV.renderSidebar('services');

const p = ARKIV.getPages();
const sv = p.services;

ARKIV.injectSEO({ title: sv.seoTitle, description: sv.seoDescription, keywords: sv.seoKeywords, canonical: ARKIV.getSettings().siteUrl + '/services' });
ARKIV.injectOrganizationLD();

document.getElementById('svc-hero-title').textContent = sv.heroTitle;
document.getElementById('svc-hero-sub').textContent = sv.heroSubtitle;

const icons = {
  camera: `<circle cx="12" cy="12" r="3"/><path d="M20 7h-3.2L15 4H9L7.2 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>`,
  portrait: `<circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>`,
  building: `<rect x="3" y="3" width="7" height="18"/><rect x="14" y="9" width="7" height="12"/><line x1="3" y1="21" x2="21" y2="21"/>`,
  film: `<rect x="2" y="6" width="20" height="12" rx="2"/><path d="M7 6v12M17 6v12M2 12h20M7 6l-5-3M17 6l5-3M7 18l-5 3M17 18l5 3"/>`,
  pen: `<path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>`,
  star: `<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>`,
};

document.getElementById('services-grid').innerHTML = sv.services.map(s => `
  <div class="service-card">
    <div class="service-icon"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">${icons[s.icon] || icons.camera}</svg></div>
    <div class="service-title">${s.title}</div>
    <p class="service-desc">${s.desc}</p>
    <div class="service-price">${s.price}</div>
  </div>
`).join('');

document.getElementById('process-steps').innerHTML = sv.process.map(s => `
  <div class="process-step">
    <div class="step-number">${s.step}</div>
    <div class="step-line"></div>
    <div class="step-title">${s.title}</div>
    <p class="step-desc">${s.desc}</p>
  </div>
`).join('');
</script>
</body>
</html>
